<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Team Visualizer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <header class="page-header">
          <div>
            <h1>Team Pilled</h1>
            <p>Create named GitHub groups, pick a color, and paste usernames.</p>
          </div>
          <button id="save-config" class="button button--primary" type="button">Save</button>
        </header>

        <form id="config-form" class="config-form">
          <section class="section">
            <div class="section-header">
              <div>
                <h2>Groups</h2>
                <p>The first matching group wins when a user appears in more than one list.</p>
              </div>
              <button id="add-group" class="button button--secondary" type="button">Add group</button>
            </div>

            <div id="groups-list" class="groups-list"></div>
          </section>

          <details class="section section--advanced">
            <summary>Advanced</summary>
            <div class="advanced-grid">
              <label class="field field--checkbox">
                <span>Show issue counts</span>
                <input id="show-issue-counts" name="showIssueCounts" type="checkbox" checked />
              </label>

              <label class="field">
                <span>Issue count cache TTL (minutes)</span>
                <input id="issue-count-cache-minutes" name="issueCountCacheMinutes" type="number" min="5" step="1" />
              </label>
            </div>
          </details>
        </form>
      </section>

      <section class="status-strip">
        <div id="status-card" class="status-card">
          <strong>Status unavailable</strong>
          <p>Save a configuration to initialize the extension.</p>
        </div>
      </section>
    </main>

    <template id="group-row-template">
      <article class="group-row">
        <label class="field">
          <span>Name</span>
          <input data-field="label" type="text" placeholder="Platform" autocomplete="off" />
        </label>

        <label class="field">
          <span>Color</span>
          <select data-field="color"></select>
        </label>

        <label class="field field--wide">
          <span>Usernames</span>
          <textarea
            data-field="usernames"
            rows="4"
            placeholder="octocat&#10;mona-lisa&#10;hubot"
            autocomplete="off"
          ></textarea>
        </label>

        <div class="row-actions">
          <button data-action="move-up" class="button button--ghost" type="button">Up</button>
          <button data-action="move-down" class="button button--ghost" type="button">Down</button>
          <button data-action="remove" class="button button--ghost button--danger" type="button">Remove</button>
        </div>
      </article>
    </template>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
